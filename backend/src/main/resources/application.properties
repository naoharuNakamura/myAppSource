spring.application.name=backend

# SQLiteからPostgreSQLへ変更
spring.datasource.url=jdbc:sqlite:${SQLITE_DB_PATH:C:/myapp/backend/database.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.dialect.SQLiteDialect
# spring.sql.init.mode=always

# MyBatisの設定
mybatis.mapper-locations=classpath:mapper/*.xml

# JWTの設定
jwt.secret-key=${JWT_SECRET:your-very-long-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-make-it-strong-and-unique-for-production}


